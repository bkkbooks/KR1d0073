body:
  text: 檀弓疑問禮類三禮記之屬提要臣等謹按檀弓疑問一卷國朝邵泰衢撰泰衢字鶴亭錢塘人明於算術雍正初以薦授欽天監左監副其書以禮記出自漢儒而檀弓一篇尤多附會乃摘其可疑者條列而論辨之如以脫驂舊館人為失禮之正以夫子夢奠之事為杳冥渺茫皆非聖人所冝出又親喪哭無常聲不應以孺子泣為難繼居仇者不反兵而鬬為啓亂端曽點之狂乃志大而有所不為非狂肆之狂倚門而歌斷無此事以王姬為齊襄公妻非魯莊公之外祖母大都皆明白正大深中理解非劉知幾之橫生臆解惑古疑經者可比惟師及齊師戰于郎一條泰衢以郎字為郊字之誤蓋據春秋戰于郊之文不知魯有二郎隱公元年費伯所城之郎在今廢魚臺縣地哀公十年與齊戰之郎則為魯近郊地案説詳江永春秋地理考實謂郎即郊則可謂郎為誤則不可又乘邱之戰一條泰衢疑魯莊公敗績之誤不知古人軍潰曰敗績車覆亦曰敗績左傳所云敗績壓覆者是也暨以戰衄為疑亦疏於考據然偶然疏舛固亦不害其大旨也乾隆四十六年四月恭校上總纂官臣紀呁臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2f0f406baff67df3635ed4624bf2d62bdfb952f4c0a6ceb82cbf8165a0901199
