body:
  text: 檀弓疑問禮類三禮記之屬提要臣等謹按檀弓疑問一卷國朝邵㤗衢撰㤗衢字鶴亭錢塘人明於算術雍正初以薦授欽天監左監副其書以禮記出自漢儒而檀弓一篇尤多附㑹乃摘其可疑者條列而論辨之如以脫驂舊館人為失禮之正以夫子夢奠之事為杳冥𣺌茫皆非聖人所冝出又親喪哭無常聲不應以孺子泣為難繼居仇者不反兵而鬬為啟亂端曽㸃之狂乃志大而有所不為非狂肆之狂倚門而歌斷無此事以王姬為齊襄公妻非魯荘公之外祖母大都皆明白正大深中理解非劉知幾之横生臆解惑古疑經者可比惟師及齊師戰于郎一條㤗衢以郎字為郊字之誤盖據春秋戰于郊之文不知魯有二郎隠公元年費伯所城之郎在今廢魚臺縣地哀公十年與齊戰之郎則為魯近郊地案說詳江永春秋地理考實謂郎即郊則可謂郎為誤則不可又乗邱之戰一條㤗衢疑魯荘公敗績之誤不知古人軍潰曰敗績車覆亦曰敗績左傳所云敗績壓覆者是也暨以戰衂為疑亦疎於考據然偶然疎舛固亦不害其大㫖也乾隆四十六年四月恭校上總纂官臣紀呁臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:22eba62c38cb738dfe5afef730eade28ff28f305990139b67b954347f00728b6
